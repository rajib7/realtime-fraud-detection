server:
    port: 8082

spring:
    application:
        name: fraud-scoring-service
    data:
        mongodb:
            uri: ${MONGO_URL:mongodb://mongo:27017/fraudops}
    kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP:kafka:9092}

fraudops:
    ml:
        base-url: ${ML_BASE_URL:http://ml-model-service:8000}

resilience4j:
    circuitbreaker:
        instances:
            ml-model:
                failure-rate-threshold: 50
                slow-call-rate-threshold: 50
                slow-call-duration-threshold: 200ms
                sliding-window-size: 20
                minimum-number-of-calls: 10
                permitted-number-of-calls-in-half-open-state: 5
                wait-duration-in-open-state: 5s
    timelimiter:
        instances:
            ml-model:
                timeout-duration: 500ms
                cancel-running-future: true

management:
    endpoints:
        web:
            exposure:
                include: health, info, prometheus, metrics, circuitbreakers, timelimiters
    endpoint:
        health:
            show-details: always
