services:
    zookeeper:
        image: bitnami/zookeeper:3.9
        environment:
            ALLOW_ANONYMOUS_LOGIN: "yes"
        ports: ["2181:2181"]

    kafka:
        image: bitnami/kafka:3.7
        depends_on: [zookeeper]
        environment:
            KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
            KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,EXTERNAL://:29092
            KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
            KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
            KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
            KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
            ALLOW_PLAINTEXT_LISTENER: "yes"
        ports: ["29092:29092"]

    mongo:
        image: mongo:7
        ports: ["27017:27017"]
        volumes: [mongo-data:/data/db]

    ml-model-service:
        build: ./ml-model-service
        ports: ["8000:8000"]
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
            interval: 10s
            retries: 5

    transaction-service:
        build:
            context: .
            dockerfile: transaction-service/Dockerfile
        depends_on: [kafka, mongo]
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            MONGO_URL: mongodb://mongo:27017/fraudops
        ports: ["8081:8081"]

    fraud-scoring-service:
        build:
            context: .
            dockerfile: fraud-scoring-service/Dockerfile
        depends_on: [kafka, mongo, ml-model-service]
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            MONGO_URL: mongodb://mongo:27017/fraudops
            ML_BASE_URL: http://ml-model-service:8000
        ports: ["8082:8082"]

    alert-service:
        build:
            context: .
            dockerfile: alert-service/Dockerfile
        depends_on: [kafka, mongo]
        environment:
            KAFKA_BOOTSTRAP: kafka:9092
            MONGO_URL: mongodb://mongo:27017/fraudops
        ports: ["8083:8083"]

volumes:
    mongo-data:
